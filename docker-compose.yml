version: '3.8'

services:
  vibecoded:
    build: .
    container_name: vibecoded-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Add your Gemini API key here
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Persist downloads and output between container restarts
      - ./downloads:/app/downloads
      - ./output:/app/output
